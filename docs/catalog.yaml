# Continuum documentation catalog.
# Discovery surface for agents and contributors. See docs/DOCUMENTATION_POLICY.md.
# Controlled vocabularies:
#   type:       tutorial, how-to, reference, explanation, troubleshooting,
#               contributor, decision-record, design-packet, invariant,
#               ownership-map, family-reference, conformance-guide, gate-record,
#               signpost
#   capability: ontology, contract-families, ownership-law, convergence,
#               warp-cli, method
#   audiences:  newcomer, maintainer, agent, contributor, app-author,
#               stack-maintainer
# Contract-family entries (type: family-reference) also carry cross-repo fields:
#   authored_home, compiler_owner, runtime_owner, consumers, compatibility_status
schema_version: 1
pages:
  # --- routers and signposts ---
  - id: docs-index
    title: Continuum documentation index
    type: reference
    capability: method
    status: current
    path: index.md
    audiences: [newcomer, maintainer, agent]
    intents: [find-the-right-page, orient]
    related: [doc-policy, overview, contract-family-registry]
  - id: doc-policy
    title: Continuum Documentation Standard
    type: contributor
    capability: method
    status: current
    path: DOCUMENTATION_POLICY.md
    audiences: [contributor, agent]
    intents: [author-docs, understand-doc-rules]
    related: [docs-index, contract-family-registry]
  - id: bearing
    title: Bearing
    type: signpost
    capability: method
    status: current
    path: BEARING.md
    audiences: [contributor, agent]
    intents: [orient]
    related: [vision, overview]
  - id: vision
    title: Vision
    type: signpost
    capability: method
    status: current
    path: VISION.md
    audiences: [contributor, agent]
    intents: [orient]
    related: [bearing]

  # --- ontology and orientation ---
  - id: overview
    title: Overview
    type: explanation
    capability: ontology
    status: current
    path: OVERVIEW.md
    audiences: [newcomer, maintainer, agent]
    intents: [understand-the-model]
    related: [getting-started, ownership-map, contract-family-registry]
  - id: getting-started
    title: Getting Started
    type: how-to
    capability: warp-cli
    status: current
    path: GETTING_STARTED.md
    audiences: [newcomer, app-author]
    intents: [run-something-first]
    related: [overview]

  # --- contract families: registry, schemas, conformance ---
  - id: contract-family-registry
    title: Contract Family Registry
    type: reference
    capability: contract-families
    status: current
    path: contract-family-registry.md
    audiences: [maintainer, agent]
    intents: [find-authored-home, check-evidence, find-open-cut]
    related: [schema-receipt, schema-settlement, schema-neighborhood-core, schema-runtime-boundary, howto-publish-evidence, packet-0029]
  - id: howto-publish-evidence
    title: Publish runtime evidence that closes a contract-family gap
    type: conformance-guide
    capability: contract-families
    status: current
    path: how-to/publish-runtime-evidence-for-a-contract-family.md
    audiences: [maintainer]
    intents: [close-a-registry-gap, prove-conformance]
    related: [contract-family-registry, schemas-readme]
  - id: schemas-readme
    title: Continuum Schemas
    type: reference
    capability: contract-families
    status: current
    path: ../schemas/README.md
    audiences: [maintainer, agent]
    intents: [find-authored-home]
    related: [contract-family-registry]
  - id: schema-receipt
    title: Receipt family
    type: family-reference
    capability: contract-families
    status: current
    path: ../schemas/continuum-receipt-family.graphql
    audiences: [maintainer, agent]
    intents: [conform-to-family]
    related: [contract-family-registry]
    authored_home: ../schemas/continuum-receipt-family.graphql
    compiler_owner: Wesley
    runtime_owner: [Echo, git-warp]
    consumers: [Echo, git-warp, warp-ttd]
    compatibility_status: runtime-open
  - id: schema-settlement
    title: Settlement family
    type: family-reference
    capability: contract-families
    status: current
    path: ../schemas/continuum-settlement-family.graphql
    audiences: [maintainer, agent]
    intents: [conform-to-family]
    related: [contract-family-registry]
    authored_home: ../schemas/continuum-settlement-family.graphql
    compiler_owner: Wesley
    runtime_owner: [Echo, git-warp]
    consumers: [Echo, git-warp, warp-ttd]
    compatibility_status: runtime-open
  - id: schema-neighborhood-core
    title: Neighborhood core family
    type: family-reference
    capability: contract-families
    status: current
    path: ../schemas/continuum-neighborhood-core-family.graphql
    audiences: [maintainer, agent]
    intents: [conform-to-family]
    related: [contract-family-registry]
    authored_home: ../schemas/continuum-neighborhood-core-family.graphql
    compiler_owner: Wesley
    runtime_owner: [Echo, git-warp]
    consumers: [warp-ttd, Echo, git-warp]
    compatibility_status: runtime-open
  - id: schema-runtime-boundary
    title: Runtime boundary family
    type: family-reference
    capability: contract-families
    status: current
    path: ../schemas/continuum-runtime-boundary-family.graphql
    audiences: [maintainer, agent]
    intents: [conform-to-family]
    related: [contract-family-registry]
    authored_home: ../schemas/continuum-runtime-boundary-family.graphql
    compiler_owner: Wesley
    runtime_owner: [Echo, git-warp]
    consumers: [Echo, git-warp, Wesley, warp-ttd]
    compatibility_status: interop-open

  # --- proposed protocol surface ---
  - id: protocol-profiles
    title: Protocol profiles and capability tiers (proposed)
    type: explanation
    capability: contract-families
    status: proposed
    path: explanation/protocol-profiles.md
    audiences: [maintainer, agent]
    intents: [understand-proposed-profiles]
    related: [contract-family-registry, schema-runtime-boundary]

  # --- invariants ---
  - id: invariants-continuum
    title: Continuum invariants
    type: invariant
    capability: ontology
    status: current
    path: invariants/CONTINUUM.md
    audiences: [maintainer, agent]
    intents: [check-an-invariant]
    related: [overview]

  # --- ownership and convergence ---
