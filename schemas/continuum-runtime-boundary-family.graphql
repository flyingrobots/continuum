type Query {
  intentEnvelopes(targetLaneId: String): [IntentEnvelope!]!
    @wes_op(name: "intentEnvelopes", readonly: true)
    @wes_footprint(reads: ["IntentEnvelope"])

  tickResults(laneId: String!, frameIndex: Int): [TickResult!]!
    @wes_op(name: "tickResults", readonly: true)
    @wes_footprint(reads: ["TickResult"])

  observerPlans(laneId: String): [ObserverPlan!]!
    @wes_op(name: "observerPlans", readonly: true)
    @wes_footprint(reads: ["ObserverPlan"])

  observationRequests(planId: ID, laneId: String, sourceKind: ObservationSourceKind): [ObservationRequest!]!
    @wes_op(name: "observationRequests", readonly: true)
    @wes_footprint(reads: ["ObservationRequest"])

  readingEnvelopes(planId: ID, laneId: String!, frameIndex: Int): [ReadingEnvelope!]!
    @wes_op(name: "readingEnvelopes", readonly: true)
    @wes_footprint(reads: ["ReadingEnvelope"])

  witnessedSuffixShells(sourceWorldlineId: String!): [WitnessedSuffixShell!]!
    @wes_op(name: "witnessedSuffixShells", readonly: true)
    @wes_footprint(reads: ["WitnessedSuffixShell", "ProvenanceRef", "SettlementBasisReport"])

  causalSuffixBundles(bundleDigest: Hash, sourceWorldlineId: String): [CausalSuffixBundle!]!
    @wes_op(name: "causalSuffixBundles", readonly: true)
    @wes_footprint(reads: ["CausalSuffixBundle", "WitnessedSuffixShell", "ProvenanceRef"])

  importOutcomes(bundleDigest: Hash, targetRuntimeId: String): [ImportOutcome!]!
    @wes_op(name: "importOutcomes", readonly: true)
    @wes_footprint(reads: ["ImportOutcome", "CausalSuffixBundle", "WitnessedSuffixAdmissionResponse"])
}

type ContinuumRuntimeBoundaryFamilyInvariants
  @wes_invariant(
    name: "tick_result_links_intent",
    expr: "forall r in TickResult: exists i in IntentEnvelope: r.intentId == i.intentId and r.laneId == i.targetLaneId",
    severity: "error"
  )
  @wes_invariant(
    name: "reading_envelope_links_request_and_plan",
    expr: "forall e in ReadingEnvelope: exists q in ObservationRequest: exists p in ObserverPlan: q.requestId == e.requestId and p.planId == e.planId and q.planId == p.planId",
    severity: "error"
  )
  @wes_invariant(
    name: "bundle_links_source_shell",
    expr: "forall b in CausalSuffixBundle: b.baseFrontier.worldlineId == b.sourceSuffix.sourceWorldlineId and b.targetFrontier.worldlineId == b.sourceSuffix.sourceWorldlineId",
    severity: "error"
  )
  @wes_invariant(
    name: "import_outcome_links_bundle",
    expr: "forall o in ImportOutcome: exists b in CausalSuffixBundle: o.bundleDigest == b.bundleDigest",
    severity: "error"
  )
  @wes_invariant(
    name: "import_outcome_embeds_matching_bundle",
    expr: "forall o in ImportOutcome: o.bundle.bundleDigest == o.bundleDigest",
    severity: "error"
  )
  @wes_invariant(
    name: "import_outcome_target_matches_bundle_frontier",
    expr: "forall o in ImportOutcome: o.targetWorldlineId == o.bundle.targetFrontier.worldlineId and o.targetBasis.worldlineId == o.bundle.targetFrontier.worldlineId",
    severity: "error"
  )
  @wes_invariant(
    name: "import_outcome_admission_matches_target_basis",
    expr: "forall o in ImportOutcome: o.admission.targetBasis.worldlineId == o.targetBasis.worldlineId and o.admission.targetBasis.refId == o.targetBasis.refId",
    severity: "error"
  )
{
  _placeholder: Boolean
}
