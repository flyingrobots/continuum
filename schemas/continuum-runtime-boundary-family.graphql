# Continuum Runtime Boundary Family
# Version: 0.1.0
#
# Continuum-authored minimum shared runtime-boundary family for:
# - set-side intent carriage
# - immediate admission result contracts
# - get-side observer planning and reading request contracts
# - distributed witnessed suffix exchange and import result contracts
#
# These are GraphQL-authored contract families.
# Wesley compiles artifacts for them.
# Sibling Continuum runtimes and tools later produce actual values conforming to them.
#
# Doctrine:
# - `IntentEnvelope` is not a mutation definition and not an admission result
# - `TickResult` names the immediate admission-result family, not the later reading
# - `ObserverPlan` names the plan family, not the observer instance
# - `ReadingEnvelope` names the observer-relative reading family, not the substrate itself
# - `WitnessedSuffixShell` is compact suffix evidence, not a patch list
# - `CausalSuffixBundle` is the transport/import question, not a materialized
#   state snapshot

scalar Hash
scalar UInt64

enum RuntimeAdmissionOutcomeKind {
  DERIVED
  PLURAL
  CONFLICT
  OBSTRUCTION
}

enum ReadingResidualPosture {
  COMPLETE
  RESIDUAL
  PLURALITY_PRESERVED
  OBSTRUCTED
  BUDGET_LIMITED
  RIGHTS_LIMITED
}

enum ConflictReason {
  CHANNEL_POLICY_CONFLICT
  UNSUPPORTED_IMPORT
  BASE_DIVERGENCE
  PARENT_FOOTPRINT_OVERLAP
  QUANTUM_MISMATCH
}

enum SettlementParentRevalidationKind {
  AT_ANCHOR
  PARENT_ADVANCED_DISJOINT
  REVALIDATION_REQUIRED
}

enum SettlementOverlapRevalidationKind {
  CLEAN
  OBSTRUCTED
  CONFLICT
}

enum WitnessedSuffixAdmissionOutcomeKind {
  ADMITTED
  STAGED
  PLURAL
  CONFLICT
  OBSTRUCTED
}

enum ImportNoveltyPosture {
  NOVEL
  ALREADY_ADJUDICATED
  SELF_ECHO
  SUPPORT_SUPPLEMENT
  ALTERNATE_SUPPORT_PATH
  STATE_EQUIVALENT_DIFFERENT_WITNESS
}

enum ObservationSourceKind {
  LIVE
  COORDINATE
  STRAND
  HOLOGRAM
}

enum ObserverStateKind {
  STATELESS
  ACCUMULATIVE
}

