# Continuum Receipt Family
# Version: 0.1.0
#
# Continuum-authored shared proving family for the first boring receipt /
# delivery / witness contract lane.
#
# Doctrine:
# - Receipt is the operational envelope around one realized rewrite.
# - DeliveryObservation is adjacent to receipt, not the same thing.
# - Witness is minimal semantic residue, not the same thing as receipt.
# - Capability is a declaration surface, not runtime policy by itself.

scalar Hash

enum DeliveryOutcome {
  DELIVERED
  SUPPRESSED
  FAILED
  SKIPPED
}

enum ExecutionMode {
  LIVE
  REPLAY
  DEBUG
}

enum CapabilityScope {
  READ
  WRITE
  CONTROL
  OBSERVE
  JUDGMENT
}

enum WitnessKind {
  FOOTPRINT
  COUNTERFACTUAL
  REINTEGRATION
  PRECONDITION
}

type Receipt
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 100)
  @wes_version(major: 0, minor: 1)
{
  receiptId: ID! @wes_stateField(key: true)
  headId: String! @wes_stateField
  frameIndex: Int! @wes_stateField @wes_constraint(min: 0)
  laneId: String! @wes_stateField
  writerId: String @wes_stateField
  inputTick: Int! @wes_stateField @wes_constraint(min: 0)
  outputTick: Int! @wes_stateField @wes_constraint(min: 0)
  admittedRewriteCount: Int! @wes_stateField @wes_constraint(min: 0)
  rejectedRewriteCount: Int! @wes_stateField @wes_constraint(min: 0)
  counterfactualCount: Int! @wes_stateField @wes_constraint(min: 0)
  digest: Hash! @wes_stateField
  summary: String! @wes_stateField
}

type DeliveryObservation
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 101)
  @wes_version(major: 0, minor: 1)
{
  observationId: ID! @wes_stateField(key: true)
  receiptId: ID! @wes_stateField
  emissionId: String! @wes_stateField
  headId: String! @wes_stateField
  frameIndex: Int! @wes_stateField @wes_constraint(min: 0)
  sinkId: String! @wes_stateField
  outcome: DeliveryOutcome! @wes_stateField
  reason: String! @wes_stateField
  observerId: String @wes_stateField
  executionMode: ExecutionMode! @wes_stateField
  summary: String! @wes_stateField
}

type Capability
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 102)
  @wes_version(major: 0, minor: 1)
{
  capabilityId: ID! @wes_stateField(key: true)
  name: String! @wes_stateField
  scope: CapabilityScope! @wes_stateField
  resource: String! @wes_stateField
  description: String @wes_stateField
}

type Witness
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 103)
  @wes_version(major: 0, minor: 1)
{
  witnessId: ID! @wes_stateField(key: true)
  receiptId: ID! @wes_stateField
  kind: WitnessKind! @wes_stateField
  residueHash: Hash! @wes_stateField
  footprint: String @wes_stateField
  summary: String! @wes_stateField
}

type Query {
  receipts(headId: String, frameIndex: Int): [Receipt!]!
    @wes_op(name: "receipts", readonly: true)
    @wes_footprint(reads: ["Receipt"])

  deliveryObservations(receiptId: ID, headId: String, frameIndex: Int): [DeliveryObservation!]!
    @wes_op(name: "deliveryObservations", readonly: true)
    @wes_footprint(reads: ["DeliveryObservation"])

  capabilities: [Capability!]!
    @wes_op(name: "capabilities", readonly: true)
    @wes_footprint(reads: ["Capability"])

  witnesses(receiptId: ID!): [Witness!]!
    @wes_op(name: "witnesses", readonly: true)
    @wes_footprint(reads: ["Witness"])
}

type ContinuumReceiptFamilyInvariants
  @wes_invariant(
    name: "delivery_links_receipt",
    expr: "forall d in DeliveryObservation: exists r in Receipt: d.receiptId == r.receiptId",
    severity: "error"
  )
  @wes_invariant(
    name: "witness_links_receipt",
    expr: "forall w in Witness: exists r in Receipt: w.receiptId == r.receiptId",
    severity: "error"
  )
  @wes_invariant(
    name: "receipt_input_tick_non_negative",
    expr: "forall r in Receipt: r.inputTick >= 0",
    severity: "error"
  )
  @wes_invariant(
    name: "receipt_output_tick_non_negative",
    expr: "forall r in Receipt: r.outputTick >= 0",
    severity: "error"
  )
{
  _placeholder: Boolean
}
