# Continuum Settlement Family
# Version: 0.1.0
#
# Continuum-authored shared publication family for compare / plan / import /
# conflict settlement surfaces.
#
# Doctrine:
# - settlement is a shared observer/debugger contract family
# - settlement is adjacent to reintegration detail, not identical to it
# - import candidates and conflict artifacts are the stable decision categories
# - receipt shell may refine settlement, but must not replace it

scalar Hash

enum ConflictReason {
  BASE_DIVERGENCE
  UNSUPPORTED_IMPORT
  CHANNEL_POLICY_CONFLICT
  QUANTUM_MISMATCH
}

enum SettlementDecisionKind {
  IMPORT
  CONFLICT
}

type SettlementRequest
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 120)
  @wes_version(major: 0, minor: 1)
{
  requestId: ID! @wes_stateField(key: true)
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  sourceHeadId: String @wes_stateField
  targetHeadId: String @wes_stateField
  summary: String! @wes_stateField
}

type SettlementDelta
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 121)
  @wes_version(major: 0, minor: 1)
{
  deltaId: ID! @wes_stateField(key: true)
  requestId: ID! @wes_stateField
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  sourceBaseFrameIndex: Int! @wes_stateField @wes_constraint(min: 0)
  sourceTipFrameIndex: Int! @wes_stateField @wes_constraint(min: 0)
  sourceReceiptIds: [ID!]! @wes_stateField
  targetAnchorFrameIndex: Int! @wes_stateField @wes_constraint(min: 0)
  targetHeadId: String! @wes_stateField
  summary: String! @wes_stateField
}

type ImportCandidate
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 122)
  @wes_version(major: 0, minor: 1)
{
  candidateId: ID! @wes_stateField(key: true)
  sourceReceiptId: ID! @wes_stateField
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  sourceHeadId: String @wes_stateField
  targetHeadId: String @wes_stateField
  writerId: String @wes_stateField
  digest: Hash @wes_stateField
  summary: String! @wes_stateField
}

type ConflictArtifact
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 123)
  @wes_version(major: 0, minor: 1)
{
  artifactId: ID! @wes_stateField(key: true)
  sourceReceiptId: ID! @wes_stateField
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  sourceHeadId: String @wes_stateField
  targetHeadId: String @wes_stateField
  reason: ConflictReason! @wes_stateField
  summary: String! @wes_stateField
}

type SettlementDecision
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 124)
  @wes_version(major: 0, minor: 1)
{
  decisionId: ID! @wes_stateField(key: true)
  planId: ID! @wes_stateField
  orderIndex: Int! @wes_stateField @wes_constraint(min: 0)
  kind: SettlementDecisionKind! @wes_stateField
  importCandidateId: ID @wes_stateField
  conflictArtifactId: ID @wes_stateField
  summary: String! @wes_stateField
}

type SettlementPlan
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 125)
  @wes_version(major: 0, minor: 1)
{
  planId: ID! @wes_stateField(key: true)
  requestId: ID! @wes_stateField
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  decisionCount: Int! @wes_stateField @wes_constraint(min: 0)
  importCount: Int! @wes_stateField @wes_constraint(min: 0)
  conflictCount: Int! @wes_stateField @wes_constraint(min: 0)
  decisions: [SettlementDecision!]! @wes_stateField
  summary: String! @wes_stateField
}

type SettlementResult
  @wes_codec(format: "cbor", canonical: true)
  @wes_registry(id: 126)
  @wes_version(major: 0, minor: 1)
{
  resultId: ID! @wes_stateField(key: true)
  planId: ID! @wes_stateField
  sourceLaneId: String! @wes_stateField
  targetLaneId: String! @wes_stateField
  imported: [ImportCandidate!]! @wes_stateField
  conflicts: [ConflictArtifact!]! @wes_stateField
  summary: String! @wes_stateField
}

type Query {
  settlementDeltas(sourceLaneId: String!, targetLaneId: String!): [SettlementDelta!]!
    @wes_op(name: "settlementDeltas", readonly: true)
    @wes_footprint(reads: ["SettlementDelta"])

  settlementPlans(sourceLaneId: String!, targetLaneId: String!): [SettlementPlan!]!
    @wes_op(name: "settlementPlans", readonly: true)
    @wes_footprint(reads: ["SettlementPlan", "SettlementDecision", "ImportCandidate", "ConflictArtifact"])

  settlementResults(sourceLaneId: String!, targetLaneId: String!): [SettlementResult!]!
    @wes_op(name: "settlementResults", readonly: true)
    @wes_footprint(reads: ["SettlementResult", "ImportCandidate", "ConflictArtifact"])
}

type Mutation {
  settleLane(sourceLaneId: String!, targetLaneId: String!, requestId: ID): SettlementResult!
    @wes_op(name: "settleLane")
    @wes_footprint(
      reads: ["SettlementDelta", "SettlementPlan"],
      writes: ["SettlementResult", "ImportCandidate", "ConflictArtifact"],
      creates: ["ImportCandidate", "ConflictArtifact"]
    )
}

type ContinuumSettlementFamilyInvariants
  @wes_invariant(
    name: "delta_window_is_non_negative",
    expr: "forall d in SettlementDelta: d.sourceBaseFrameIndex >= 0 and d.sourceTipFrameIndex >= 0 and d.targetAnchorFrameIndex >= 0",
    severity: "error"
  )
  @wes_invariant(
    name: "plan_decision_count_matches_rows",
    expr: "forall p in SettlementPlan: p.decisionCount == len(p.decisions)",
    severity: "error"
  )
  @wes_invariant(
    name: "result_links_plan",
    expr: "forall r in SettlementResult: exists p in SettlementPlan: r.planId == p.planId",
    severity: "error"
  )
{
  _placeholder: Boolean
}
