"""
Continuum TTD Directives

These directives are owned by the Continuum Wesley TTD compiler module. They are
not part of generic Wesley's directive registry.
"""

# Channel: Defines a message channel with typed payloads.
directive @wes_channel(
  name: String
  version: Int
  ordered: Boolean
  persistent: Boolean
) on OBJECT

# Op: Defines an operation that can be invoked.
directive @wes_op(
  name: String
  idempotent: Boolean
  readonly: Boolean
  timeout: Int
) on FIELD_DEFINITION

# Rule: Defines a transition rule for state machines.
directive @wes_rule(
  name: String!
  from: [String!]!
  to: String!
  guard: String
) on FIELD_DEFINITION

# Invariant: Defines a system invariant.
directive @wes_invariant(
  name: String!
  expr: String!
  severity: String
) on OBJECT | FIELD_DEFINITION

# Emission: Defines an emission contract for an operation.
directive @wes_emission(
  channel: String!
  event: String!
  condition: String
) on FIELD_DEFINITION

enum WesAccess {
  READ
  WRITE
  DELETE
}

enum WesCardinality {
  ONE
  OPTIONAL
  MANY
}

input WesFootprintSlot {
  slot: String!
  kind: String!
  bindFromArg: String
  bindFromSlot: String
  bindRelation: String
  access: [WesAccess!]!
  cardinality: WesCardinality = ONE
}

input WesFootprintClosure {
  slot: String!
  fromSlot: String!
  operator: String!
  argBindings: [String!]
  reads: [String!]!
  cardinality: WesCardinality = MANY
}

input WesFootprintCreateSlot {
  slot: String!
  kind: String!
  cardinality: WesCardinality = ONE
}

input WesFootprintUpdate {
  slot: String!
  fields: [String!]!
}

# Footprint: Defines resource footprint for an operation.
directive @wes_footprint(
  reads: [String!]
  writes: [String!]
  creates: [String!]
  deletes: [String!]
  slots: [WesFootprintSlot!]
  closures: [WesFootprintClosure!]
  createSlots: [WesFootprintCreateSlot!]
  updates: [WesFootprintUpdate!]
  forbids: [String!]
) on FIELD_DEFINITION

# Requires: Declares prerequisites for an operation.
directive @wes_requires(
  ops: [String!]
  state: String
  permissions: [String!]
) on FIELD_DEFINITION

# Produces: Declares what an operation produces.
directive @wes_produces(
  events: [String!]
  state: String
) on FIELD_DEFINITION

# EmitsTo: Simplified emission declaration.
directive @wes_emitsTo(
  channel: String!
  within: Int
) on FIELD_DEFINITION

# MustEmit: Asserts that an event must be emitted.
directive @wes_mustEmit(
  event: String!
  within: Int
) on FIELD_DEFINITION

# Codec: Specifies serialization codec for a type.
directive @wes_codec(
  format: String!
  canonical: Boolean
) on OBJECT

# Registry: Marks a type for inclusion in the registry.
directive @wes_registry(
  id: Int
  deprecated: Boolean
  deprecatedBy: String
) on OBJECT | FIELD_DEFINITION

# StateField: Marks a field as part of state.
directive @wes_stateField(
  key: Boolean
  derived: Boolean
  derivation: String
) on FIELD_DEFINITION

# Tick: Marks a type as a tick event.
directive @wes_tick(
  interval: Int!
  jitter: Int
) on OBJECT

# Effect: Declares side effects of an operation.
directive @wes_effect(
  type: String!
  description: String
) on FIELD_DEFINITION

# Constraint: Declares a constraint on a field.
directive @wes_constraint(
  min: Int
  max: Int
  minLength: Int
  maxLength: Int
  pattern: String
  oneOf: [String!]
) on FIELD_DEFINITION

# Version: Marks schema version for a type.
directive @wes_version(
  major: Int!
  minor: Int!
  patch: Int
) on OBJECT
