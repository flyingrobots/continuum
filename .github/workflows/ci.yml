name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    name: docs gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: docs-lint
        run: node scripts/docs-lint.mjs

  warp:
    name: warp tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: node --test
        run: node --test apps/warp/test/*.test.mjs
